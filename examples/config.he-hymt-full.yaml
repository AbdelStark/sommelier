schema_version: sommelier.config.v2

# Hebrew tool-calling slice translated locally with Tencent Hy-MT2-1.8B (Q8_0
# GGUF via ollama). This is a deliberately separate, honestly-scoped experiment:
# the project name and Hebrew dataset id differ from the preregistered v3
# artifacts, so it does not claim to be that OpenAI-teacher + human-reviewed
# evidence. It is trained and benchmarked through remote_hy_pipeline.py, which
# reuses the standard stages without the preregistered-evidence admission gate.

project:
  name: sommelier-he-hymt-full
  artifact_root: artifacts
  seed: 42

model:
  base_model_id: nvidia/Llama-3.1-Nemotron-Nano-8B-v1
  base_model_revision: 54641c1611fcff44fa4865626462445e0a153fc7
  tokenizer_revision: 54641c1611fcff44fa4865626462445e0a153fc7
  allow_remote_code: false

datasets:
  - language: en
    dataset_id: Salesforce/xlam-function-calling-60k
    dataset_revision: 26d14ebfe18b1f7b524bd39b404b50af5dc97866
    query_column: query
    tools_column: tools
    answers_column: answers
  # Exact training input. This immutable revision is now privately quarantined
  # because it inherited credential-shaped synthetic strings; the public
  # sanitized release is documented separately and is not byte-identical.
  - language: he
    dataset_id: abdelstark/sommelier-xlam-single-call-splits-he-hymt
    dataset_revision: c9598f1855ca88e11a4aa31c53ad387faf467eb2
    query_column: query
    tools_column: tools
    answers_column: answers
    source_id_column: source_example_id

data:
  n_train: 15000
  n_validation: 1000
  n_test: 1000
  min_query_chars: 10
  max_query_chars: 2000
  dedupe_key: normalized_query

formatting:
  system_prompt: >
    You are a tool-calling model. Select the correct tool and return only
    the JSON tool call. Do not include explanations.
  template_policy: tokenizer_chat_template
  target_format: json_tool_call

train:
  epochs: 2
  per_device_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 0.0002
  scheduler: cosine
  warmup_ratio: 0.03
  max_sequence_length: 4096
  quantization: nf4-4bit
  compute_dtype: bfloat16
  lora_rank: 16
  lora_alpha: 32
  lora_dropout: 0.05
  languages:
    - en
    - he
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

eval:
  split: test
  slices:
    - en
    - he
  temperature: 0.0
  do_sample: false
  max_new_tokens: 512
  parser_version: sommelier.parser.v1

remote:
  enabled: true
  gpu: L40S
  data_timeout_seconds: 1800
  train_timeout_seconds: 43200
  eval_timeout_seconds: 18000

report:
  retain_raw_generations: true
  redact_fields: []

tracking:
  enabled: false
  provider: wandb
  project: sommelier
