schema_version: sommelier.config.v2

project:
  name: sommelier-smoke
  artifact_root: artifacts
  seed: 42

model:
  base_model_id: nvidia/Llama-3.1-Nemotron-Nano-8B-v1
  base_model_revision: 54641c1611fcff44fa4865626462445e0a153fc7
  tokenizer_revision: 54641c1611fcff44fa4865626462445e0a153fc7
  allow_remote_code: false

datasets:
  - language: en
    dataset_id: Salesforce/xlam-function-calling-60k
    dataset_revision: 26d14ebfe18b1f7b524bd39b404b50af5dc97866
    query_column: query
    tools_column: tools
    answers_column: answers

data:
  n_train: 100
  n_validation: 20
  n_test: 20
  min_query_chars: 10
  max_query_chars: 2000
  dedupe_key: normalized_query

formatting:
  system_prompt: >
    You are a tool-calling model. Select the correct tool and return only
    the JSON tool call. Do not include explanations.
  template_policy: tokenizer_chat_template
  target_format: json_tool_call

train:
  epochs: 1
  per_device_batch_size: 2
  gradient_accumulation_steps: 1
  learning_rate: 0.0002
  scheduler: cosine
  warmup_ratio: 0.03
  max_sequence_length: 2048
  quantization: nf4-4bit
  compute_dtype: bfloat16
  lora_rank: 8
  lora_alpha: 16
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

eval:
  split: test
  temperature: 0.0
  do_sample: false
  max_new_tokens: 256
  parser_version: sommelier.parser.v1

remote:
  enabled: true
  gpu: A10G
  # Planning estimates used only for the outer-timeout admission floor.
  # The current single-function pipeline has no per-stage watchdogs.
  data_timeout_seconds: 900
  train_timeout_seconds: 3600
  eval_timeout_seconds: 1800

report:
  retain_raw_generations: true
  redact_fields: []
