site_name: Sommelier
site_description: >-
  Fine-tune small open models into reliable JSON tool callers,
  reproducibly, end to end, on a single GPU.
site_url: https://abdelstark.github.io/sommelier/
repo_url: https://github.com/AbdelStark/sommelier
repo_name: AbdelStark/sommelier
edit_uri: edit/main/docs/

# Raw working notes and the Remotion video projects stay in the repo but
# out of the published site.
exclude_docs: |
  blogposts/sommelier_experiment_braindump.md
  videos/

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn

theme:
  name: material
  icon:
    logo: material/glass-wine
    repo: fontawesome/brands/github
  favicon: assets/favicon.svg
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - .
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/AbdelStark/sommelier
    - icon: simple/huggingface
      link: https://huggingface.co/abdelstark

copyright: MIT licensed. Third-party model and dataset obligations documented in the repo.

nav:
  - Home: index.md
  - Getting started:
      - Installation: getting-started/installation.md
      - Quickstart: getting-started/quickstart.md
  - Concepts:
      - The pipeline: concepts/pipeline.md
      - Artifacts and manifests: concepts/artifacts.md
      - Determinism and the comparison gate: concepts/determinism.md
      - Data policy: concepts/data.md
      - Training approach: concepts/training.md
      - The adapter and the base model: concepts/adapter.md
      - Evaluation method: concepts/evaluation.md
      - Design decisions: concepts/design-decisions.md
  - Guides:
      - Reproduce the reference run: guides/reproduction.md
      - Run the pipeline on Modal: guides/remote-execution.md
      - Serve the adapter: guides/serving.md
  - Reference:
      - CLI: reference/cli.md
      - Configuration: reference/configuration.md
      - Artifacts and schemas: reference/artifacts.md
      - Errors and exit codes: reference/errors.md
      - Metrics: reference/metrics.md
  - Results:
      - The reference run: results/reference-run.md
      - The French run: results/french-run.md
  - Project:
      - Security model: project/security.md
      - Licensing: project/licensing.md
      - Testing: project/testing.md
      - Release checklist: release/v1.0-checklist.md
      - Changelog: project/changelog.md
      - How it was built: blogposts/sommelier_blog_post.md
      - Le run français, raconté: blogposts/sommelier_v2_run_francais.md
