name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy sommelier tests

      - name: Pytest
        run: uv run pytest

      - name: Config validate
        run: uv run sommelier config validate --config examples/config.smoke.yaml

      - name: Fixture validation
        run: uv run sommelier data validate-fixtures
